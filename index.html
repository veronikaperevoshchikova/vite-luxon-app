<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite + Luxon + Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .btn-red-full {
            background-color: #dc3545;
            border-color: #dc3545;
            color: white;
            font-size: 1.5rem;
            padding: 20px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row w-100 g-0">
            <div class="col-2"></div>
            <div class="col-8 d-flex">
                <button type="button" id="showTimeBtn" class="btn btn-red-full">
                    Показать время
                </button>
            </div>
            <div class="col-2"></div>
        </div>
    </div>

    <div id="modal-root"></div>

    <script>
        function getCurrentDateTime() {
            return luxon.DateTime.now().setLocale('ru').toFormat('dd.LL.yyyy HH:mm:ss');
        }

        const modalContainer = document.createElement('div');
        modalContainer.innerHTML = `
            <div class="modal fade" id="luxonModal" tabindex="-1" aria-labelledby="luxonModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="luxonModalLabel">Ника Перевощикова</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                        </div>
                        <div class="modal-body text-center">
                            <p class="fs-1" id="modalDateTime">--:--:--</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modalContainer);

        const modalElement = document.getElementById('luxonModal');
        const modal = new bootstrap.Modal(modalElement);
        const showBtn = document.getElementById('showTimeBtn');

        showBtn.addEventListener('click', () => {
            document.getElementById('modalDateTime').textContent = getCurrentDateTime();
            modal.show();
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
